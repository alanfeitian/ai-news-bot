name: AI News Daily Push

on:
  schedule:
    # 每天 UTC 时间 00:00 (北京时间 08:00) 运行
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Debug Environment
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
      run: |
        echo "Checking environment variables..."
        if [ -z "$DEEPSEEK_API_KEY" ]; then
          echo "Error: DEEPSEEK_API_KEY is empty"
        else
          echo "DEEPSEEK_API_KEY is set (length: ${#DEEPSEEK_API_KEY})"
        fi
        
        if [ -z "$DINGTALK_WEBHOOK" ]; then
          echo "Error: DINGTALK_WEBHOOK is empty"
        else
          echo "DINGTALK_WEBHOOK is set (length: ${#DINGTALK_WEBHOOK})"
        fi
        
    - name: Run script
      env:
        DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        DINGTALK_WEBHOOK: ${{ secrets.DINGTALK_WEBHOOK }}
        DINGTALK_SECRET: ${{ secrets.DINGTALK_SECRET }}
      run: python main.py
